<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoinBot — Bağlantı yok</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0e13;
      color: #94a3b8;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 1.5rem;
    }
    h1 { color: #e2e8f0; font-size: 1.25rem; margin: 0 0 0.5rem; }
    p  { font-size: 0.875rem; margin: 0 0 1.5rem; max-width: 320px; }
    button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #22d3ee40;
      background: #22d3ee15;
      color: #22d3ee;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #22d3ee25; }
  </style>
</head>
<body>
  <h1>Bağlantı yok</h1>
  <p>CoinBot, gerçek zamanlı bot ve piyasa verisi için internet bağlantısı gerektirir. Bağlantınızı kontrol edip tekrar deneyin.</p>
  <button onclick="location.reload()">Tekrar Dene</button>
</body>
</html>
